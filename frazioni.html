<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frazioni — dalla parte all'intero, con impalcatura a scomparsa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#1E3A8A;   --primaryD:#172E6B;  --primaryL:rgba(30,58,138,.08);
  --accent:#D97706;    --accentD:#B45309;   --accentL:rgba(217,119,6,.12);
  --ok:#15803D;        --okL:rgba(21,128,61,.10);
  --bg:#FBF9F4;        --card:#FFFFFF;
  --text:#1F2937;      --muted:#5B6472;     --light:#9AA2AE;
  --brd:#E3DDD0;       --brd2:#CFC7B6;
  --shadow:0 2px 14px rgba(30,58,138,.07);
  --maxw:1100px;
  --head:'Lexend',system-ui,sans-serif;
  --body:'Lexend',system-ui,sans-serif;
  --radius:14px;
}
html.accessibile{ --body:'Atkinson Hyperlegible',Helvetica,Arial,sans-serif; }
html.accessibile body{ letter-spacing:.01em; line-height:1.75; }

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--body);font-size:18px;line-height:1.65;color:var(--text);background:var(--bg);-webkit-text-size-adjust:100%}
h1,h2,h3,.head{font-family:var(--head);font-weight:600;line-height:1.25;margin:0}
a{color:var(--primary)}
:focus-visible{outline:3px solid var(--accent);outline-offset:2px;border-radius:6px}

.topbar{position:sticky;top:0;z-index:40;background:var(--card);border-bottom:1px solid var(--brd);box-shadow:var(--shadow)}
.topbar-in{max-width:var(--maxw);margin:0 auto;display:flex;align-items:center;gap:14px;padding:12px 18px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:11px;margin-right:auto}
.brand .mark{width:38px;height:38px;border-radius:10px;flex:0 0 auto;background:var(--primary);color:#fff;display:grid;place-items:center}
.brand .mark svg{width:22px;height:22px}
.brand h1{font-size:1.06rem;letter-spacing:-.01em}
.brand .sub{font-size:.78rem;color:var(--muted);font-family:var(--body);font-weight:400}
.tool{display:inline-flex;align-items:center;gap:8px;min-height:44px;padding:8px 14px;font-family:var(--head);font-size:.9rem;font-weight:500;color:var(--text);background:var(--card);border:1.5px solid var(--brd2);border-radius:11px;cursor:pointer;transition:background .15s,border-color .15s}
.tool svg{width:18px;height:18px}
.tool:hover{background:var(--primaryL);border-color:var(--primary)}
.tool[aria-pressed="true"]{background:var(--primary);border-color:var(--primary);color:#fff}
.tool.ghost{border-color:var(--brd)}
.tool.danger:hover{background:var(--accentL);border-color:var(--accent);color:var(--accentD)}
.nick-chip{display:inline-flex;align-items:center;gap:7px;min-height:44px;padding:6px 13px;border-radius:11px;background:var(--primaryL);color:var(--primaryD);font-family:var(--head);font-weight:500;font-size:.9rem}
.nick-chip svg{width:17px;height:17px}

main{max-width:var(--maxw);margin:0 auto;padding:30px 18px 64px}
.phase-head{margin-bottom:20px}
.phase-kicker{display:inline-flex;align-items:center;gap:8px;font-family:var(--head);font-weight:600;font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;color:var(--accentD);background:var(--accentL);padding:5px 12px;border-radius:999px;margin-bottom:12px}
.phase-kicker svg{width:15px;height:15px}
.phase-head h2{font-size:1.7rem;letter-spacing:-.02em;margin-bottom:8px}
.phase-head p.lead{color:var(--muted);max-width:64ch;margin:0}

.btn{display:inline-flex;align-items:center;gap:9px;min-height:48px;padding:11px 20px;font-family:var(--head);font-weight:600;font-size:.95rem;border-radius:12px;cursor:pointer;border:1.5px solid transparent;transition:background .15s,border-color .15s,transform .05s}
.btn:active{transform:translateY(1px)}
.btn svg{width:18px;height:18px}
.btn.primary{background:var(--primary);color:#fff}
.btn.primary:hover{background:var(--primaryD)}
.btn.secondary{background:var(--card);color:var(--text);border-color:var(--brd2)}
.btn.secondary:hover{border-color:var(--primary);background:var(--primaryL)}
.btn[disabled]{opacity:.4;cursor:not-allowed}

.gate{position:fixed;inset:0;z-index:90;background:rgba(31,41,55,.55);backdrop-filter:blur(3px);display:grid;place-items:center;padding:20px}
.gate[hidden]{display:none}
.gate-card{background:var(--card);border-radius:18px;max-width:440px;width:100%;padding:30px 28px;box-shadow:0 18px 60px rgba(0,0,0,.25)}
.gate-card .mark{width:54px;height:54px;border-radius:14px;background:var(--primary);color:#fff;display:grid;place-items:center;margin-bottom:16px}
.gate-card .mark svg{width:30px;height:30px}
.gate-card h2{font-size:1.35rem;margin-bottom:6px;letter-spacing:-.01em}
.gate-card p{color:var(--muted);font-size:.95rem;margin:0 0 18px}
.field label{display:block;font-family:var(--head);font-weight:600;font-size:.85rem;margin-bottom:7px}
.field input{width:100%;min-height:50px;padding:12px 14px;font-size:18px;font-family:var(--body);color:var(--text);border:1.5px solid var(--brd2);border-radius:12px;background:#fff}
.field input:focus-visible{border-color:var(--primary)}
.gate-card .btn{width:100%;justify-content:center;margin-top:16px}
.gate-msg{min-height:20px;font-size:.85rem;color:var(--accentD);margin-top:10px}

.notice{display:flex;gap:11px;align-items:flex-start;background:var(--accentL);border:1px solid var(--accent);color:var(--accentD);border-radius:12px;padding:13px 15px;font-size:.92rem}
.notice svg{width:20px;height:20px;flex:0 0 auto;margin-top:1px}
footer{max-width:var(--maxw);margin:0 auto;padding:22px 18px 40px;color:var(--light);font-size:.82rem;border-top:1px solid var(--brd)}

/* ---------- Pratica con impalcatura a scomparsa ---------- */
.f3-intro{margin:0 0 4px;max-width:66ch}
.f3-intro b{color:var(--primaryD)}
.f3-steps{display:flex;flex-direction:column;gap:20px;margin-top:18px}
.f3-prob{border:1px solid var(--brd);border-radius:var(--radius);background:var(--card);box-shadow:var(--shadow);overflow:hidden;transition:opacity .25s,filter .25s}
.f3-prob.locked{opacity:.5;filter:grayscale(.45);pointer-events:none}
.f3-phead{display:flex;align-items:center;gap:12px;padding:13px 18px;background:var(--primaryL);border-bottom:1px solid var(--brd)}
.f3-badge{display:inline-flex;align-items:center;gap:9px;font-family:var(--head);font-weight:600;font-size:.92rem;color:var(--primaryD)}
.f3-badge .n{width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;display:grid;place-items:center;font-weight:700;font-size:.85rem}
.f3-support{margin-left:auto;display:inline-flex;align-items:center;gap:9px;font-family:var(--head);font-weight:600;font-size:.74rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.f3-gauge{width:56px;height:8px;border-radius:5px;background:var(--brd);overflow:hidden}
.f3-gauge i{display:block;height:100%;background:var(--accent);transition:width .3s}
.f3-body{padding:18px}
.f3-story{margin:0 0 12px;font-size:1.02rem}
.f3-story b{color:var(--primaryD)}
.f3-illus{margin:4px 0 16px;background:var(--bg);border:1px solid var(--brd);border-radius:12px;padding:12px 10px}
.f3-illus svg{width:100%;max-width:460px;height:auto;display:block;margin:0 auto}
.f3-given{background:var(--bg);border:1px solid var(--brd);border-radius:12px;padding:13px 16px;margin:0 0 14px}
.f3-given .lab{font-family:var(--head);font-weight:600;font-size:.76rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:9px}
.f3-maxtext{margin:0 0 14px;font-size:1.05rem;background:var(--accentL);border:1px solid var(--accent);border-radius:11px;padding:11px 14px;color:var(--text);font-family:var(--head);font-weight:600}
.f3-maxtext b{color:var(--accentD);font-weight:700}
.f3-answer{display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin-top:16px}
.f3-answer .eq{font-family:var(--head);font-weight:600;font-size:1.1rem;color:var(--text)}
.f3-answer input{width:118px;min-height:50px;font-size:22px;text-align:center;border:1.5px solid var(--brd2);border-radius:12px;font-family:var(--head);font-weight:700;color:var(--primary);background:#fff}
.f3-answer input:focus-visible{border-color:var(--primary)}
.f3-answer input:disabled{opacity:.85;background:var(--okL);border-color:var(--ok);color:var(--ok)}
.f3-scratch{display:block;width:100%;max-width:520px;margin:0 0 4px;font-size:17px;font-family:var(--body);padding:11px 13px;border:1.5px solid var(--brd2);border-radius:12px;resize:vertical;color:var(--text);background:#fff;line-height:1.5}
.f3-scratch:focus-visible{border-color:var(--primary);outline:none}
.f3-fb{min-height:22px;margin-top:13px;font-size:.95rem;font-weight:500}
.f3-fb.retry{color:var(--accentD)}
.f3-fb.ok{color:var(--ok)}
.f3-prob.solved .f3-phead{background:var(--okL)}
.f3-prob.solved .f3-badge,.f3-prob.solved .f3-badge .n{color:var(--ok)}
.f3-prob.solved .f3-badge .n{background:var(--ok);color:#fff}

/* passaggi (template a riempimento) */
.pp-prop{display:flex;flex-wrap:wrap;align-items:center;gap:9px;font-family:var(--head);font-weight:700;font-size:1.2rem;color:var(--primaryD);margin:2px 0}
.pp-prop .op{color:var(--muted);font-weight:600}
.pp-prop input{width:90px;min-height:48px;font-size:21px;text-align:center;border:1.5px solid var(--brd2);border-radius:11px;font-family:var(--head);font-weight:700;color:var(--primary);background:#fff}
.pp-prop input:focus-visible{border-color:var(--primary)}
.pp-prop input:disabled{opacity:.85;background:var(--okL);border-color:var(--ok);color:var(--ok)}
.pp-prop .lbl{display:block;font-family:var(--body);font-weight:400;font-size:.7rem;color:var(--muted);text-align:center;margin-top:3px}
.pp-cell{display:flex;flex-direction:column}

/* video introduttivo */
.vid{margin:0 0 24px}
.vid-head{display:inline-flex;align-items:center;gap:9px;font-family:var(--head);font-weight:600;font-size:.92rem;color:var(--primaryD);background:var(--primaryL);padding:6px 13px;border-radius:999px;margin-bottom:12px}
.vid-head svg{width:18px;height:18px}
.vid-wrap{background:#000;border:1px solid var(--brd);border-radius:16px;overflow:hidden;max-width:330px;margin:0 auto;box-shadow:var(--shadow)}
.vid-wrap video{display:block;width:100%;height:auto}
.vid-cap{text-align:center;color:var(--muted);font-size:.85rem;margin:9px auto 0;max-width:42ch}

@media(max-width:560px){
  .brand .sub{display:none}
  .phase-head h2{font-size:1.4rem}
  main{padding:22px 14px 50px}
  .pp-prop{font-size:1.05rem;gap:6px}
}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
  <defs>
    <g id="ic-frac"><line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><rect x="9" y="4.5" width="6" height="4" rx="1" fill="currentColor"/><rect x="9" y="15.5" width="6" height="4" rx="1" fill="currentColor"/></g>
    <g id="ic-check"><path d="M5 12.5l4.5 4.5L19 7" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/></g>
    <g id="ic-play"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><path d="M10 8.5l6 3.5-6 3.5z" fill="currentColor"/></g>
    <g id="ic-arrow"><path d="M5 12h13M12 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></g>
    <g id="ic-access"><circle cx="12" cy="4.6" r="2" fill="currentColor"/><path d="M4 8.5c2.6 1 5.1 1.5 8 1.5s5.4-.5 8-1.5M12 10v5M12 15l-3.2 5M12 15l3.2 5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></g>
    <g id="ic-reset"><path d="M19 12a7 7 0 1 1-2.05-4.95M19 4v4h-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></g>
  </defs>
</svg>

<div class="gate" id="gate" role="dialog" aria-modal="true" aria-labelledby="gate-title">
  <div class="gate-card">
    <div class="mark"><svg viewBox="0 0 24 24"><use href="#ic-frac"/></svg></div>
    <h2 id="gate-title">Chi sei oggi?</h2>
    <p>Scrivi un soprannome per ritrovare il tuo lavoro. Sui Mac condivisi serve a non mescolare il percorso di compagni diversi.</p>
    <div class="field">
      <label for="nick-input">Soprannome</label>
      <input id="nick-input" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" maxlength="24" placeholder="es. lince-gialla">
    </div>
    <button class="btn primary" id="gate-start" type="button">
      <svg viewBox="0 0 24 24"><use href="#ic-arrow"/></svg> Inizia
    </button>
    <div class="gate-msg" id="gate-msg" role="status" aria-live="polite"></div>
  </div>
</div>

<header class="topbar">
  <div class="topbar-in">
    <div class="brand">
      <span class="mark"><svg viewBox="0 0 24 24"><use href="#ic-frac"/></svg></span>
      <div>
        <h1>Dalla parte all'intero</h1>
        <div class="sub">pratica guidata &middot; scuola secondaria di I grado</div>
      </div>
    </div>
    <span class="nick-chip" id="nick-chip" hidden>
      <svg viewBox="0 0 24 24"><use href="#ic-access"/></svg>
      <span id="nick-label">—</span>
    </span>
    <button class="tool" id="btn-access" type="button" aria-pressed="false">
      <svg viewBox="0 0 24 24"><use href="#ic-access"/></svg>
      <span>Alta leggibilità</span>
    </button>
    <button class="tool ghost danger" id="btn-reset" type="button">
      <svg viewBox="0 0 24 24"><use href="#ic-reset"/></svg>
      <span>Ricomincia</span>
    </button>
  </div>
</header>

<main id="main"></main>

<footer>Prototipo — pratica guidata sulle frazioni: dalla parte all'intero.</footer>

<script>
"use strict";
(function(){

  const STORE_KEY = "fraz_v1_state";
  function loadStore(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }catch(e){ return {}; } }
  function saveStore(s){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(s)); }catch(e){} }
  function freshProfile(){ return { accessibile:false, data:{} }; }

  let store = loadStore();
  if(typeof store.profiles !== "object" || store.profiles === null) store.profiles = {};
  let nick = store.active || null;
  function profile(){ if(!nick) return null; if(!store.profiles[nick]) store.profiles[nick]=freshProfile(); return store.profiles[nick]; }
  function persist(){ saveStore(store); }

  const gate=document.getElementById("gate"), nickInput=document.getElementById("nick-input"),
    gateStart=document.getElementById("gate-start"), gateMsg=document.getElementById("gate-msg"),
    nickChip=document.getElementById("nick-chip"), nickLabel=document.getElementById("nick-label"),
    main=document.getElementById("main"), btnAccess=document.getElementById("btn-access"),
    btnReset=document.getElementById("btn-reset");

  function icon(id){ return '<svg viewBox="0 0 24 24" aria-hidden="true"><use href="#'+id+'"/></svg>'; }

  /* Barra divisa in `den` parti uguali; le prime `num` sono la parte nota.
     Se reveal mostra il valore di ogni parte e l'intero ricostruito. */
  function fracSVG(num, den, parte, intero, reveal){
    const W=460, x0=14, x1=446, top=30, barH=46;
    const cw=(x1-x0)/den, unit=intero/den;
    let s="";
    for(let i=0;i<den;i++){
      const cx=x0+i*cw, shaded=i<num;
      s += '<rect x="'+cx.toFixed(1)+'" y="'+top+'" width="'+cw.toFixed(1)+'" height="'+barH+'" fill="'+(shaded?'var(--accentL)':'#fff')+'" stroke="var(--brd2)" stroke-width="1.5"/>';
      if(reveal) s += '<text x="'+(cx+cw/2).toFixed(1)+'" y="'+(top+barH/2+5)+'" text-anchor="middle" font-family="var(--head)" font-size="12" font-weight="600" fill="'+(shaded?'var(--accentD)':'var(--muted)')+'">'+unit+'</text>';
    }
    /* graffa sopra la parte nota */
    const sx1=x0+num*cw, by=top-9;
    s += '<path d="M'+x0+' '+by+' V'+(by-6)+' H'+sx1.toFixed(1)+' V'+by+'" fill="none" stroke="var(--accent)" stroke-width="1.5"/>';
    s += '<text x="'+((x0+sx1)/2).toFixed(1)+'" y="'+(by-10)+'" text-anchor="middle" font-family="var(--head)" font-size="12.5" font-weight="700" fill="var(--accentD)">parte = '+parte+'</text>';
    let H=top+barH+18;
    if(reveal){
      const uy=top+barH+9;
      s += '<path d="M'+x0+' '+uy+' V'+(uy+6)+' H'+x1+' V'+uy+'" fill="none" stroke="var(--ok)" stroke-width="1.5"/>';
      s += '<text x="'+((x0+x1)/2)+'" y="'+(uy+23)+'" text-anchor="middle" font-family="var(--head)" font-size="13" font-weight="700" fill="var(--ok)">intero = '+intero+'</text>';
      H=uy+31;
    }
    const aria = reveal ? ("Le "+num+" parti su "+den+" valgono "+parte+", quindi l'intero è "+intero)
                        : ("Una barra divisa in "+den+" parti uguali: "+num+" sono evidenziate e valgono in tutto "+parte);
    return '<div class="f3-illus"><svg viewBox="0 0 '+W+' '+H+'" role="img" aria-label="'+aria+'"><title>'+aria+'</title>'+s+'</svg></div>';
  }

  function hintFor(P, ans){
    if(ans === P.parte) return "Quella è la parte che conosci, non l'intero: l'intero è più grande.";
    if(ans < P.parte) return "L'intero non può essere minore della parte che ne conosci.";
    if(ans === P.parte * P.den) return "Hai moltiplicato la parte per il denominatore: prima trova quanto vale UNA parte, dividendo per il numeratore.";
    return "Ricontrolla: intero = (parte ÷ numeratore) × denominatore.";
  }

  const PROBS = [
    { support:"2/3", frac:66, level:1,
      story:'I <b>2/5</b> di un libro sono <b>60</b> pagine. Quante pagine ha il libro <b>intero</b>?',
      num:2, den:5, parte:60, intero:150, unit:"pagine", illus:"full" },
    { support:"1/3", frac:33, level:2,
      story:'I <b>3/7</b> di una pista ciclabile misurano <b>51</b> km. Quanto è lunga la pista <b>intera</b>?',
      num:3, den:7, parte:51, intero:119, unit:"km", illus:"plain" },
    { support:"0", frac:0, level:3,
      story:'I <b>4/9</b> di un risparmio sono <b>72</b> euro. A quanto ammonta il risparmio <b>intero</b>?',
      num:4, den:9, parte:72, intero:162, unit:"euro", illus:"none" }
  ];

  function buildPractice(body){
    const d = profile().data;
    if(!d.fraz) d.fraz = { solved:[false,false,false], scratch:"" };
    const st = d.fraz;
    if(!Array.isArray(st.solved) || st.solved.length !== 3) st.solved=[false,false,false];

    body.innerHTML =
      '<p class="f3-intro">Il metodo del video: la parte che conosci vale alcune parti uguali del tutto. '+
      'Prima trovi quanto vale <b>una</b> parte (<b>parte &divide; numeratore</b>), '+
      'poi ricostruisci l\'intero (<b>&times; denominatore</b>). '+
      'Tre problemi: nel primo quasi tutto è pronto, poi l\'aiuto cala, fino all\'ultimo che risolvi da solo.</p>'+
      '<div class="f3-steps" id="f3-steps"></div>';
    const wrap = body.querySelector("#f3-steps");

    function refreshLocks(){
      [].slice.call(wrap.children).forEach((el,idx)=>{
        const unlocked = idx===0 || st.solved[idx-1];
        el.classList.toggle("locked", !unlocked);
        el.classList.toggle("solved", !!st.solved[idx]);
      });
    }

    function renderProb(P, idx){
      const el = document.createElement("div");
      el.className = "f3-prob";
      const solved = !!st.solved[idx];

      let mid = "";
      if(P.level === 1){
        mid += '<div class="f3-given"><div class="lab">Quello che sai dal testo</div>'+
          '<div class="pp-prop"><span class="pp-cell">'+P.num+'/'+P.den+'<span class="lbl">la frazione</span></span>'+
          '<span class="op">valgono</span><span class="pp-cell">'+P.parte+'<span class="lbl">la parte</span></span></div></div>'+
          '<p class="f3-maxtext">Una parte (1/'+P.den+') = '+P.parte+' : '+P.num+'  &rarr;  intero = ('+P.parte+' : '+P.num+') &times; '+P.den+'</p>';
      } else if(P.level === 2){
        mid += '<div class="f3-given"><div class="lab">Completa il calcolo (per quale numero dividi? per quale moltiplichi?)</div>'+
          '<div class="pp-prop"><span>intero =</span><span class="op">( '+P.parte+' :</span>'+
          '<span class="pp-cell"><input type="number" inputmode="numeric" min="1" class="pp-num" aria-label="numeratore"'+(solved?' value="'+P.num+'" disabled':'')+'><span class="lbl">numeratore</span></span>'+
          '<span class="op">) &times;</span>'+
          '<span class="pp-cell"><input type="number" inputmode="numeric" min="1" class="pp-den" aria-label="denominatore"'+(solved?' value="'+P.den+'" disabled':'')+'><span class="lbl">denominatore</span></span></div></div>';
      } else {
        mid += '<textarea class="f3-scratch" rows="3" placeholder="Spazio per i tuoi calcoli (facoltativo)…"></textarea>';
      }

      const ansHTML = '<div class="f3-answer"><span class="eq">Intero =</span>'+
        '<input type="number" inputmode="numeric" min="0" class="f3-ans" aria-label="Intero"'+(solved?' value="'+P.intero+'" disabled':'')+'>'+
        '<span class="eq">'+P.unit+'</span>'+
        (solved?'':'<button class="btn primary f3-check" type="button">'+icon("ic-check")+'Verifica</button>')+'</div>';

      const illusHTML = P.illus==="none" ? '' : fracSVG(P.num, P.den, P.parte, P.intero, P.illus==="full");

      el.innerHTML =
        '<div class="f3-phead"><span class="f3-badge"><span class="n">'+(idx+1)+'</span>Problema '+(idx+1)+'</span>'+
          '<span class="f3-support">Supporto '+P.support+'<span class="f3-gauge"><i style="width:'+P.frac+'%"></i></span></span></div>'+
        '<div class="f3-body"><p class="f3-story">'+P.story+'</p>'+illusHTML+mid+ansHTML+
          '<div class="f3-fb'+(solved?' ok':'')+'" role="status" aria-live="polite">'+(solved?'Risolto: '+P.intero+' '+P.unit+'.':'')+'</div></div>';

      const fb=el.querySelector(".f3-fb"), ansEl=el.querySelector(".f3-ans"),
        checkBtn=el.querySelector(".f3-check"), scratch=el.querySelector(".f3-scratch");
      function setFb(k,t){ fb.className="f3-fb "+k; fb.textContent=t; }
      if(scratch){ scratch.value=st.scratch||""; scratch.addEventListener("input",()=>{ st.scratch=scratch.value; persist(); }); }
      if(checkBtn){
        checkBtn.addEventListener("click", ()=>{
          if(P.level === 2){
            const nIn=parseInt(el.querySelector(".pp-num").value,10);
            const dIn=parseInt(el.querySelector(".pp-den").value,10);
            if(isNaN(nIn)||isNaN(dIn)){ setFb("retry","Completa il calcolo con numeratore e denominatore."); return; }
            if(nIn===P.den && dIn===P.num){ setFb("retry","Hai invertito numeratore e denominatore: dividi per il numeratore (le parti che conosci), moltiplichi per il denominatore (le parti totali)."); return; }
            if(nIn!==P.num || dIn!==P.den){ setFb("retry","Controlla: si divide per il numeratore e si moltiplica per il denominatore, poi riprova."); return; }
          }
          const ans=parseInt(ansEl.value,10);
          if(isNaN(ans)){ setFb("retry","Scrivi quanto vale l'intero."); return; }
          if(ans===P.intero){
            st.solved[idx]=true; persist();
            setFb("ok","Esatto: "+P.intero+" "+P.unit+". "+(idx<2?"Si sblocca il problema successivo, con meno aiuto.":"Hai chiuso i tre problemi, l'ultimo senza impalcatura."));
            ansEl.disabled=true; checkBtn.disabled=true;
            const ne=el.querySelector(".pp-num"), de=el.querySelector(".pp-den");
            if(ne) ne.disabled=true; if(de) de.disabled=true;
            el.classList.add("solved"); refreshLocks();
          } else {
            setFb("retry","Non ci siamo ancora. "+hintFor(P,ans));
          }
        });
      }
      return el;
    }

    PROBS.forEach((P,idx)=>wrap.appendChild(renderProb(P,idx)));
    refreshLocks();
  }

  function videoIntro(){
    const drop="https://dl.dropboxusercontent.com/scl/fi/5wnzlbjp4jdxe3fa7xcfn/frazioni1.mp4?rlkey=56a77si8ze9apoh1ass5zen4e&raw=1";
    return '<section class="vid">'+
      '<span class="vid-head">'+icon("ic-play")+'Guarda prima il video</span>'+
      '<div class="vid-wrap"><video controls preload="metadata" playsinline>'+
        '<source src="'+drop+'" type="video/mp4">'+
        '<source src="frazioni1.mp4" type="video/mp4">'+
        'Il tuo browser non riproduce il video. <a href="'+drop+'">Aprilo qui<\/a>.'+
      '<\/video></div>'+
      '<p class="vid-cap">Il metodo spiegato passo passo. Poi mettilo in pratica nei tre problemi qui sotto.</p></section>';
  }

  function renderMain(){
    main.innerHTML =
      '<div class="phase-head">'+
        '<span class="phase-kicker">'+icon("ic-frac")+'Pratica · dalla parte all\'intero</span>'+
        '<h2>Conosci una frazione: ricostruisci il tutto</h2>'+
        '<p class="lead">Tre problemi, sempre lo stesso metodo: trova quanto vale una parte, poi moltiplica per il denominatore. A ogni problema l\'impalcatura si abbassa.</p>'+
      '</div>'+videoIntro()+'<div class="phase-body"></div>';
    buildPractice(main.querySelector(".phase-body"));
  }

  function applyAccess(){ const p=profile(); const on=!!(p&&p.accessibile); document.documentElement.classList.toggle("accessibile",on); btnAccess.setAttribute("aria-pressed",on?"true":"false"); }
  btnAccess.addEventListener("click", ()=>{ const p=profile(); if(!p) return; p.accessibile=!p.accessibile; persist(); applyAccess(); });
  btnReset.addEventListener("click", ()=>{ if(!nick) return; if(!window.confirm('Ricominciare da capo il lavoro di "'+nick+'"? I progressi salvati verranno cancellati.')) return; delete store.profiles[nick]; store.active=null; nick=null; persist(); openGate(); });

  function openGate(){ gate.hidden=false; nickChip.hidden=true; nickInput.value=""; gateMsg.textContent=""; document.documentElement.classList.remove("accessibile"); setTimeout(()=>nickInput.focus(),60); }
  function startWith(raw){ const clean=raw.trim().replace(/\s+/g,"-").toLowerCase().slice(0,24); if(clean.length<2){ gateMsg.textContent="Scrivi almeno due caratteri."; nickInput.focus(); return; } nick=clean; store.active=nick; if(!store.profiles[nick]) store.profiles[nick]=freshProfile(); persist(); enterApp(); }
  gateStart.addEventListener("click", ()=>startWith(nickInput.value));
  nickInput.addEventListener("keydown", e=>{ if(e.key==="Enter") startWith(nickInput.value); });

  function enterApp(){ gate.hidden=true; nickChip.hidden=false; nickLabel.textContent=nick; applyAccess(); renderMain(); }
  function init(){ if(nick && store.profiles[nick]) enterApp(); else { nick=null; store.active=null; openGate(); } }
  init();
})();
</script>
